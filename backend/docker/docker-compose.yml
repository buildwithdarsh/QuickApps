version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: quickapps-postgres
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: quickapps
      POSTGRES_PASSWORD: quickapps
      POSTGRES_DB: quickapps
    volumes:
      - quickapps_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: quickapps-redis
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - quickapps_redis:/data

volumes:
  quickapps_pgdata:
  quickapps_redis:
